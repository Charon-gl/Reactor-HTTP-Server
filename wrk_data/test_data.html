<!DOCTYPE html>
<html>

<head>
    <title>Reactor HTTP Server 完整性能数据</title>
    <script src="https://cdn.plot.ly/plotly-2.27.1.min.js" charset="utf-8"></script>
</head>

<body>
    <h1>Reactor HTTP Server 压测数据（原始数据，按测试时长分组）</h1>

    <h2>单线程 (accept优化后) - 不同测试时长下的 QPS vs 并发数</h2>
    <div id="single_qps" style="width:100%;height:500px;"></div>

    <h2>单线程 (accept优化后) - 平均延迟 vs 并发数</h2>
    <div id="single_lat" style="width:100%;height:500px;"></div>

    <h2>线程池版本 - QPS vs 并发数 (按时长)</h2>
    <div id="pool_qps" style="width:100%;height:500px;"></div>

    <h2>线程池版本 - 平均延迟 vs 并发数</h2>
    <div id="pool_lat" style="width:100%;height:500px;"></div>

    <script>
        //单线程优化后数据
        //10s
        const conn10 = [10, 30, 50, 100];
        const qps10 = [18749.59, 21267.43, 22415.45, 21054.89];
        const lat10 = [0.5228, 1.34, 2.05, 4.34];

        //30s（正常范围，不含过载点）
        const conn30_normal = [100, 500, 1000, 3000, 5000, 7500, 10000, 12500, 13750, 13800];
        const qps30_normal = [20675.18, 19218.58, 18774.34, 18003.47, 17524.66, 17325.52, 16983.95, 18486.85, 17879.97, 17540.11];
        const lat30_normal = [4.42, 22.78, 47.04, 121.77, 150.96, 176.04, 196.66, 208.01, 212.07, 217.57];

        //30s 过载点
        const conn_overload = [15000, 20000, 30000];
        const qps_overload = [6029.88, 3484.18, 1519.91];
        const lat_overload = [1030, 891, 863];

        //60s
        const conn60 = [100];
        const qps60 = [20617.16];
        const lat60 = [4.43];

        //QPS 图 - 单线程
        const trace1 = {
            x: conn10, y: qps10, mode: 'lines+markers', name: '10s 测试',
            line: { color: '#1f77b4' }, marker: { size: 8 }
        };
        const trace2 = {
            x: conn30_normal, y: qps30_normal, mode: 'lines+markers', name: '30s 测试 (正常)',
            line: { color: '#ff7f0e' }, marker: { size: 8 }
        };
        const trace3 = {
            x: conn_overload, y: qps_overload, mode: 'lines+markers', name: '30s 测试 (过载)',
            line: { color: '#d62728', dash: 'dot' }, marker: { size: 8 }
        };
        const trace4 = {
            x: conn60, y: qps60, mode: 'markers', name: '60s 测试',
            marker: { color: '#2ca02c', size: 10, symbol: 'star' }
        };

        Plotly.newPlot('single_qps', [trace1, trace2, trace3, trace4], {
            title: '单线程 (accept优化后) QPS 对比',
            xaxis: { title: '并发连接数', type: 'log' },
            yaxis: { title: 'QPS (requests/sec)' },
            hovermode: 'closest'
        });

        //延迟图 - 单线程
        const lat_trace1 = { x: conn10, y: lat10, mode: 'lines+markers', name: '10s 测试', line: { color: '#1f77b4' } };
        const lat_trace2 = { x: conn30_normal, y: lat30_normal, mode: 'lines+markers', name: '30s 测试 (正常)', line: { color: '#ff7f0e' } };
        const lat_trace3 = { x: conn_overload, y: lat_overload, mode: 'lines+markers', name: '30s 测试 (过载)', line: { color: '#d62728', dash: 'dot' } };
        const lat_trace4 = { x: conn60, y: lat60, mode: 'markers', name: '60s 测试', marker: { color: '#2ca02c', size: 10 } };

        Plotly.newPlot('single_lat', [lat_trace1, lat_trace2, lat_trace3, lat_trace4], {
            title: '单线程 (accept优化后) 平均延迟',
            xaxis: { title: '并发连接数', type: 'log' },
            yaxis: { title: '延迟 (ms)' },
            hovermode: 'closest'
        });

        //线程池版本
        const pool_conn10 = [100, 300];
        const pool_qps10 = [3394.09, 3526.55];
        const pool_lat10 = [15.78, 45.85];

        const pool_conn30 = [100, 300, 500, 1000, 3000, 5000, 6000, 7500, 10000];
        const pool_qps30 = [2250.11, 3069.80, 3082.09, 2704.92, 3532.38, 3649.92, 3862.08, 3588.93, 4346.30];
        const pool_lat30 = [23.06, 50.53, 82.16, 187.09, 407.44, 634.05, 738.09, 929.06, 952.69];

        const pool_trace1 = { x: pool_conn10, y: pool_qps10, mode: 'lines+markers', name: '10s 测试', line: { color: '#1f77b4' } };
        const pool_trace2 = { x: pool_conn30, y: pool_qps30, mode: 'lines+markers', name: '30s 测试', line: { color: '#ff7f0e' } };

        Plotly.newPlot('pool_qps', [pool_trace1, pool_trace2], {
            title: '线程池版本 QPS',
            xaxis: { title: '并发连接数', type: 'log' },
            yaxis: { title: 'QPS (requests/sec)' }
        });

        const pool_lat_trace1 = { x: pool_conn10, y: pool_lat10, mode: 'lines+markers', name: '10s 测试', line: { color: '#1f77b4' } };
        const pool_lat_trace2 = { x: pool_conn30, y: pool_lat30, mode: 'lines+markers', name: '30s 测试', line: { color: '#ff7f0e' } };

        Plotly.newPlot('pool_lat', [pool_lat_trace1, pool_lat_trace2], {
            title: '线程池版本 平均延迟',
            xaxis: { title: '并发连接数', type: 'log' },
            yaxis: { title: '延迟 (ms)' }
        });
    </script>
</body>

</html>
